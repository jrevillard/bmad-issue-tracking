# Issue Tracking override for bmad-check-implementation-readiness
# Updates issue descriptions if implementation readiness checks cause modifications to tracked artifacts.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Scalar: runs after the check-implementation-readiness workflow completes.
on_complete = """
Check `issue_tracking` in `_bmad/bmm/config.yaml`:
- If the section does not exist, or `platform` is not set: output "Issue tracking not configured. Open a new session and run `/bmad-issue-tracking-setup` (step 5) to configure the platform. When done, come back here and say 'done' — the configuration will be re-verified and the workflow will resume." and stop.
- If `branch_patterns` is not set: output "Branch strategy not configured. Open a new session and run `/bmad-issue-tracking-setup` (step 6b) to configure branch patterns. When done, come back here and say 'done' — the configuration will be re-verified and the workflow will resume." and stop.

After completing the implementation readiness check, determine if any tracked artifacts were modified (PRD, epics, architecture, UX design). If files were modified, update the corresponding issue descriptions. Follow the shared sync task at `{project-root}/_bmad/_config/custom/bmad-bmm-issue-sync.md`. Specifically:

1. Follow Step 1 (detect platform and project, verify connectivity). Stop if the issue tracker is unavailable.
2. Read prd_key from the PRD file frontmatter. If not found, ask the user and offer to persist it.
3. For each tracked artifact that was modified during the readiness check, update its issue description:

   **PRD** (`{planning_artifacts}/prd.md`):
   - Find the PRD issue whose title starts with "PRD:". If not found, skip.
   - Write description to `/tmp/desc.md`:

     ```
     **PRD:** {prd_key}

     ---

     {full PRD file content}
     ```

   **Epics** (`{planning_artifacts}/epics.md`):
   - For each modified epic section, find the epic issue whose title starts with "Epic {N}:"
   - Extract the epic section from epics.md (from `## Epic N:` to the next `## Epic` or end of file)
   - Write description using the same format with epic number

4. Update the issue description using the platform-appropriate command:
   - **GitLab:** `glab api --method PUT "projects/$PROJECT_ID/issues/$IID" --hostname $HOST -f "description=@/tmp/desc.md"` — do NOT send the `labels` parameter, it would replace all labels
   - **GitHub:** `gh issue edit {number} --body-file "/tmp/desc.md" -R "$OWNER/$REPO" [--hostname $HOST]`
5. If no tracked artifacts were modified, skip all updates.
6. Clean up temp files.
"""
