# Issue Tracking override for bmad-create-epics-and-stories
# Switches to the PRD worktree before running the BMM workflow.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

activation_steps_append = [
  "Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/create-epics-and-stories/activation.yaml`.",
]
