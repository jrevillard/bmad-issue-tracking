# Issue Tracking override for bmad-create-prd
# Captures prd_key during activation and creates a PRD issue on completion.
# Also creates the PRD branch and a draft PR/MR when the PRD is ready.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

activation_steps_append = [
  "Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/create-prd/activation.yaml`.",
]

on_complete = """
Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/create-prd/complete.yaml`.
"""
