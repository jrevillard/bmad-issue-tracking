# Issue Tracking override for bmad-create-ux-design
# Switches to the PRD worktree before running the BMM workflow.
# Commits and pushes UX design changes after completion.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

activation_steps_append = [
  "Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/create-ux-design/activation.yaml`.",
]

on_complete = """
Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/create-ux-design/complete.yaml`.
"""
