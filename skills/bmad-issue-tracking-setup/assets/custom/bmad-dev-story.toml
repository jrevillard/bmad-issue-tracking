# Issue Tracking override for bmad-dev-story
# Posts an implementation summary when the story transitions to review, and updates status.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Array (append): runs after greet but before the workflow begins.
activation_steps_append = [
  "Check that `branch_patterns` is set in `issue_tracking` in `_bmad/bmm/config.yaml`. If not set, output 'Branch strategy not configured. Open a new session and run /bmad-issue-tracking-setup (step 6b) to configure branch patterns. When done, come back here and say done.' and stop.",
  "Read `branch_patterns.prd` and `branch_patterns.story` from `issue_tracking` in `_bmad/bmm/config.yaml`, and `prd_key` from the PRD frontmatter. Resolve both patterns with `{prd_key}`. List all local branches matching the story branch pattern. For each matching branch, read `sprint-status.yaml` and find stories with status `ready-for-dev`. If there are several, ask the user which story to work on. Create or switch to the selected story worktree.",
]

# Scalar: runs after the dev-story workflow completes.
on_complete = """
Check `issue_tracking` in `_bmad/bmm/config.yaml`:
- If the section does not exist, or `platform` is not set: output "Issue tracking not configured. Open a new session and run `/bmad-issue-tracking-setup` (step 5) to configure the platform. When done, come back here and say 'done' â€” the configuration will be re-verified and then continue these instructions." and stop.
- If `branch_patterns` is not set: output "Branch strategy not configured. Open a new session and run `/bmad-issue-tracking-setup` (step 6b) to configure branch patterns. When done, come back here and say 'done' â€” the configuration will be re-verified and then continue these instructions." and stop.

After completing the dev story, sync the story's status and post an implementation summary to the issue tracker. Follow the shared sync task at `{project-root}/_bmad/_config/custom/bmad-bmm-issue-sync.md`. Specifically:

1. Follow Step 1 (detect platform and project, verify connectivity). Stop if the issue tracker is unavailable.
2. Read prd_key from the PRD file frontmatter. If not found, ask the user and offer to persist it.
3. Find the issue whose description contains the story key. If not found, skip.
4. Update the issue status label based on the workflow outcome:
   - If the story is ready for review: set status label to `review`, reopen if closed.
   - If the story was completed (all acceptance criteria met): set status label to `done`, close the issue.
   - Otherwise: set status label to `in-progress`, reopen if closed.
5. If the final status is `review`, post an implementation summary comment. Write the comment to `/tmp/dev-story-comment.md`. Summarize the key changes in 2-5 bullet points. For "Notes", include any known limitations, areas that need special attention, or deviations from the original story. Use this template:

```
## Ready for Review

### Implemented
- {key change 1}
- {key change 2}

### Notes
- {point of attention for the reviewer}
```

6. Post the comment using the platform-appropriate add-comment command (see sync task command table: Add comment row). Skip if the final status is not `review`.
7. Commit all changes in the current worktree.
8. Push the story branch to the remote.
9. Exit the worktree and keep it.
10. Clean up temp files.
"""
