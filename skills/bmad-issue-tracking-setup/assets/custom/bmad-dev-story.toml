# Issue Tracking override for bmad-dev-story
# Posts an implementation summary when the story transitions to review, and updates status.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Array (append): runs after greet but before the workflow begins.
activation_steps_append = [
  "Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/dev-story/activation.yaml`.",
]

# Scalar: runs after the dev-story workflow completes.
on_complete = """
Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/dev-story/complete.yaml`.
"""
