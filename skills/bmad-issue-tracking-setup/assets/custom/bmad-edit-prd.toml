# Issue Tracking override for bmad-edit-prd
# Updates the PRD issue description when the PRD is edited.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Scalar: runs after the edit-prd workflow completes.
on_complete = """
Check `issue_tracking` in `_bmad/bmm/config.yaml`:
- If the section does not exist, or `platform` is not set: output "Issue tracking not configured. Open a new session and run `/bmad-issue-tracking-setup` (step 5) to configure the platform. When done, come back here and say 'done' — the configuration will be re-verified and the workflow will resume." and stop.

After editing the PRD, update the PRD issue description. Follow the shared sync task at `{project-root}/_bmad/_config/custom/bmad-bmm-issue-sync.md`. Specifically:

1. Follow Step 1 (detect platform and project, verify connectivity). Stop if the issue tracker is unavailable.
2. Read prd_key from the PRD file frontmatter. If not found, ask the user and offer to persist it.
3. Find the PRD issue whose title starts with "PRD:". If not found, skip.
4. Read the full PRD file content from `{planning_artifacts}/prd.md`.
5. Write the new description to `/tmp/prd-desc.md` using this format:

```
**PRD:** {prd_key}

---

{full PRD file content}
```

6. Update the issue description using the platform-appropriate command:
   - **GitLab:** `glab api --method PUT "projects/$PROJECT_ID/issues/$IID" --hostname $HOST -f "description=@/tmp/prd-desc.md"` — do NOT send the `labels` parameter, it would replace all labels
   - **GitHub:** `gh issue edit {number} --body-file "/tmp/prd-desc.md" -R "$OWNER/$REPO" [--hostname $HOST]`
7. Clean up temp files.
"""
