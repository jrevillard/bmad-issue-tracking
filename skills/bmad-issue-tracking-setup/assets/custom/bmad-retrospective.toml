# Issue Tracking override for bmad-retrospective
# Switches to the PRD worktree before running the BMM workflow.
# Creates an issue (GitLab or GitHub) when a retrospective is saved.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

activation_steps_append = [
  "Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/retrospective/activation.yaml`.",
]

on_complete = """
Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/retrospective/complete.yaml`.
"""
