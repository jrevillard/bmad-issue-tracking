# Issue Tracking override for bmad-sprint-planning
# Triggers a full issue sync after sprint planning completes.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Scalar: runs after sprint planning completes.
on_complete = """
Follow the shared sync task at `{project-root}/_bmad/_config/custom/bmad-bmm-issue-sync.md` (Step 1 validates config and connectivity — do NOT skip it). Only use the exact CLI commands from the sync task table — do NOT improvise.

After completing sprint planning and updating sprint-status.yaml, sync all entries to the issue tracker by following the shared sync task at `{project-root}/_bmad/_config/custom/bmad-bmm-issue-sync.md`. Run the full sync (Steps 1 through 6).
"""
