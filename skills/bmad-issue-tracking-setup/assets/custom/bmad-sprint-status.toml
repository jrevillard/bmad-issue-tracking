# Issue Tracking override for bmad-sprint-status
# Triggers a full issue sync after sprint status reconciliation.
# Overrides merge: scalars win, arrays append.
# Requires BMM 6.4.0+ (customize.toml support for this skill).

[workflow]

# Scalar: runs after sprint status reconciliation completes.
on_complete = """
Read `_bmad/_config/custom/bmad-workflow-lang.md` for the workflow language specification, then execute `_bmad/_config/custom/workflows/sprint-status/complete.yaml`.
"""
