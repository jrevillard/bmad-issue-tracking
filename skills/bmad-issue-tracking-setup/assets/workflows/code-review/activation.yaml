# code-review/activation.yaml
#
# Purpose: Finds a story with status "review" and switches to its worktree.
# Input variables: (none)
# Output variables: (set by common/find-stories)
#   - selected_story: the branch name chosen by the user (or auto-selected)
#   - selected_worktree_path: the filesystem path to the selected story worktree
# Side effects: switches agent working directory to selected worktree

- INCLUDE: common/check-config
- INCLUDE: common/find-prd
- SET: { variable: target_status, value: "review" }
- INCLUDE: common/find-stories
- CD: {selected_worktree_path}
- OUTPUT:
    message: "Switched to story {selected_story}."
