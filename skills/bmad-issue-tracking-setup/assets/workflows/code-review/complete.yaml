# code-review/complete.yaml
#
# Purpose: Updates the story issue status after code review and optionally merges the MR.
# Input variables: (none)
# Output variables:
#   - story_key: the story key derived from the current branch name
# Side effects: updates issue status, posts review comment, commits, pushes;
#               optionally merges the story MR

- INCLUDE: common/check-config
- READ: {planning_artifacts}/prd.md
  EXTRACT:
    prd_key: frontmatter.prd_key
# Re-derive story_key from current branch name
- RUN: git branch --show-current
  STORE: current_branch
- RUN: python3 -c "
import sys
branch = sys.argv[1]
parts = branch.rstrip().split('/')
if len(parts) >= 3:
    print(parts[-1])
else:
    print(branch)
" {current_branch}
  STORE: story_key
- CHECK: empty story_key
  TRUE:
    - OUTPUT:
        message: "Could not determine story_key from branch '{current_branch}'."
        stop: true
# Determine review verdict from sprint-status.yaml
- READ: {implementation_artifacts}/sprint-status.yaml
  EXTRACT:
    review_status: development_status.{story_key}
- CHECK: review_status eq "done"
  TRUE:
    - SET: { variable: new_status, value: "done" }
    - SET: { variable: close, value: "true" }
    - INCLUDE: common/set-story-status
  FALSE:
    - SET: { variable: new_status, value: "in-progress" }
    - SET: { variable: close, value: "false" }
    - INCLUDE: common/set-story-status
# Post review findings as comment on issue
- CHECK: empty issue_id
  FALSE:
    - RUN: python3 -c "
import sys, re
with open(sys.argv[1]) as f:
    content = f.read()
match = re.search(r'(### Review Findings.*?)(?=\n## |\Z)', content, re.DOTALL)
if match:
    print(match.group(1).strip())
else:
    print('')
" {implementation_artifacts}/{story_key}.md
      STORE: review_section
    - CHECK: empty review_section
      FALSE:
        - WRITE:
            file: /tmp/review-findings.md
            content: "{review_section}"
        - RUN: glab api --method POST "projects/{project}/issues/{issue_id}/notes" --hostname {host} -F "body=@/tmp/review-findings.md"
          PLATFORM: gitlab
          EXPECT_EXIT: 0
        - RUN: gh issue comment {issue_id} --body-file "/tmp/review-findings.md" -R "{host}/{project}"
          PLATFORM: github
          EXPECT_EXIT: 0
        - RUN: az boards work-item update --id {issue_id} --discussion "$(cat /tmp/review-findings.md)" --org {host} --project {project}
          PLATFORM: azure-devops
          EXPECT_EXIT: 0
        - RUN: rm -f /tmp/review-findings.md
# Commit and push
- RUN: git add .
- RUN: git commit --allow-empty -m "code review {story_key}"
- RUN: git push
# CI gate: MR must have green CI before merging
- CHECK: review_status eq "done"
  TRUE:
    - INCLUDE: common/wait-for-green-ci
# Optional merge
- OUTPUT:
    message: "Merge the story MR now? (yes/no)"
    store: do_merge
- CHECK: do_merge eq "yes"
  TRUE:
    - READ: _bmad/custom/issue-tracking.yaml
      EXTRACT:
        prd_pattern: issue_tracking.branch_patterns.prd
    - RUN: python3 -c "
import sys
print(sys.argv[1].replace('{prd_key}', sys.argv[2]))
" {prd_pattern} {prd_key}
      STORE: prd_branch
    - CHECK: git_platform eq "gitlab"
      TRUE:
        - CHECK: git_platform eq platform
          TRUE:
            - RUN: glab mr merge --source-branch {current_branch} --target-branch {prd_branch} --remove-source-branch -R "{host}/{project}"
              EXPECT_EXIT: 0
          FALSE:
            - READ: _bmad/custom/issue-tracking.yaml
              EXTRACT:
                git_host: issue_tracking.git_host
                git_project: issue_tracking.git_project
            - RUN: glab mr merge --source-branch {current_branch} --target-branch {prd_branch} --remove-source-branch -R "{git_host}/{git_project}"
              EXPECT_EXIT: 0
      FALSE:
        - CHECK: git_platform eq "github"
          TRUE:
            - CHECK: git_platform eq platform
              TRUE:
                - RUN: gh pr list --head {current_branch} --base {prd_branch} --json number -R "{host}/{project}"
                  STORE: pr_list
                - CHECK: empty pr_list
                  FALSE:
                    - FILTER:
                        source: pr_list
                        select: number
                        store: pr_number
                    - RUN: gh pr merge {pr_number} --delete-branch -R "{host}/{project}"
                      EXPECT_EXIT: 0
                  TRUE:
                    - OUTPUT:
                        message: "No PR found for this story branch. Cannot merge."
              FALSE:
                - READ: _bmad/custom/issue-tracking.yaml
                  EXTRACT:
                    git_host: issue_tracking.git_host
                    git_project: issue_tracking.git_project
                - RUN: python3 -c "
import sys
parts = sys.argv[1].split('/')
print(parts[0])
" {git_project}
                  STORE: git_owner
                - RUN: python3 -c "
import sys
parts = sys.argv[1].split('/')
print(parts[1])
" {git_project}
                  STORE: git_repo
                - RUN: gh pr list --head {current_branch} --base {prd_branch} --json number -R "{git_host}/{git_owner}/{git_repo}"
                  STORE: pr_list
                - CHECK: empty pr_list
                  FALSE:
                    - FILTER:
                        source: pr_list
                        select: number
                        store: pr_number
                    - RUN: gh pr merge {pr_number} --delete-branch -R "{git_host}/{git_owner}/{git_repo}"
                      EXPECT_EXIT: 0
                  TRUE:
                    - OUTPUT:
                        message: "No PR found for this story branch. Cannot merge."
          FALSE:
            - CHECK: git_platform eq "azure-devops"
              TRUE:
                - CHECK: git_platform eq platform
                  TRUE:
                    - RUN: az repos pr list --source-branch {current_branch} --target-branch {prd_branch} --org {host} --project {project} --output json
                      STORE: pr_list
                    - CHECK: empty pr_list
                      FALSE:
                        - RUN: python3 -c "
import json, sys
data = json.loads(sys.argv[1])
print(data[0]['pullRequestId'])
" {pr_list}
                          STORE: pr_id
                        - RUN: az repos pr update --id {pr_id} --status completed --org {host} --project {project}
                          EXPECT_EXIT: 0
                      TRUE:
                        - OUTPUT:
                            message: "No PR found for this story branch. Cannot merge."
                  FALSE:
                    - READ: _bmad/custom/issue-tracking.yaml
                      EXTRACT:
                        git_host: issue_tracking.git_host
                        git_project: issue_tracking.git_project
                    - RUN: az repos pr list --source-branch {current_branch} --target-branch {prd_branch} --org {git_host} --project {git_project} --output json
                      STORE: pr_list
                    - CHECK: empty pr_list
                      FALSE:
                        - RUN: python3 -c "
import json, sys
data = json.loads(sys.argv[1])
print(data[0]['pullRequestId'])
" {pr_list}
                          STORE: pr_id
                        - RUN: az repos pr update --id {pr_id} --status completed --org {git_host} --project {git_project}
                          EXPECT_EXIT: 0
                      TRUE:
                        - OUTPUT:
                            message: "No PR found for this story branch. Cannot merge."
    - RUN: git worktree remove .
- OUTPUT:
    message: "Story {story_key} code review complete."
