# common/ensure-labels.yaml
#
# Purpose: Ensures all required BMAD labels exist on the issue tracker.
#           Creates any labels that are missing (skips if already exist).
# Input variables: (none — uses platform, host, project from scope)
# Output variables: (none)
# Side effects: creates labels on the issue tracker

# NOTE: || true suppresses ALL errors (not just "already exists"), including auth/network
# failures. The sync task (/bmad-bmm-issue-sync) handles additional dynamic/extended labels.
# Type labels
- RUN: glab label create --name "type{sep}prd" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "type{sep}prd" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "type{sep}story" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "type{sep}story" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "type{sep}epic" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "type{sep}epic" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "type{sep}retrospective" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "type{sep}retrospective" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
# Status labels
- RUN: glab label create --name "status{sep}ready-for-dev" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "status{sep}ready-for-dev" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "status{sep}in-progress" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "status{sep}in-progress" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "status{sep}review" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "status{sep}review" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
- RUN: glab label create --name "status{sep}done" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: gitlab
- RUN: gh label create "status{sep}done" -R "{host}/{project}" 2>/dev/null || true
  PLATFORM: github
