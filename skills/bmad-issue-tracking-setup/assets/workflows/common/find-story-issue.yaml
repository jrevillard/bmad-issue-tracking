# common/find-story-issue.yaml
#
# Purpose: Finds the issue tracker ID for a story issue.
# Input variables:
#   - story_key: the story key (e.g. "1-3-login-form")
#   - prd_key: the PRD key (from scope, set by find-prd)
# Output variables:
#   - story_issue_id: the issue ID on the tracker (empty if not found)
# Side effects: none

- RUN: glab api "projects/{project}/issues?search={story_key}&labels=prd{sep}{prd_key}" --hostname {host} --paginate
  STORE: issue_result
  PLATFORM: gitlab
- RUN: gh api "repos/{project}/issues?state=all&per_page=100&labels=prd{sep}{prd_key}" --hostname {host} --paginate
  STORE: issue_result
  PLATFORM: github
- CHECK: empty issue_result
  TRUE:
    - SET: { variable: story_issue_id, value: "" }
  FALSE:
    - CHECK: platform eq "gitlab"
      TRUE:
        - FILTER:
            source: issue_result
            select: iid
            store: story_issue_id
      FALSE:
        - RUN: python3 -c "
import sys
parts = sys.argv[1].split('-')
print(parts[0] + '.' + parts[1])
" {story_key}
          STORE: story_title_prefix
        - FILTER:
            source: issue_result
            select: number
            where: title matches "{story_title_prefix}"
            store: story_issue_id
