# common/set-story-status.yaml
#
# Purpose: Finds a story issue and updates its status label.
#           Combines find-issue + update-issue-status in one call.
# Input variables (must be set by caller before INCLUDE):
#   - story_key: the story key (e.g. "1-3-login-form")
#   - prd_key: the PRD key (from scope, set by find-prd)
#   - new_status: the target status (e.g. "in-progress", "review", "done")
#   - close: "true" to close the issue, "false" to keep it open
# Output variables:
#   - issue_id: the issue ID on the tracker (empty if not found)
# Side effects: updates issue status labels on the tracker

- SET: { variable: search_text, value: "{story_key}" }
- INCLUDE: common/find-issue
- CHECK: empty issue_id
  TRUE:
    - OUTPUT:
        message: "Issue not found for story {story_key}. Skipping status update."
  FALSE:
    - INCLUDE: common/update-issue-status
