# common/update-issue-status.yaml
#
# Purpose: Updates an issue's status label and optionally closes/reopens it.
# Input variables:
#   - issue_id: the numeric ID of the issue (IID for GitLab, number for GitHub)
#   - new_status: the target status (e.g. "review", "done", "in-progress")
#   - close: "true" to close the issue, "false" to reopen it, "none" to skip state change
# Output variables: (none)
# Side effects: updates issue labels and state on the issue tracker

# GitLab: fetch current labels, filter out old status::*, append new, send full set
- RUN: glab api "projects/$PROJECT_ID/issues/{issue_id}" --hostname $HOST --paginate
  STORE: issue_detail
  PLATFORM: gitlab
- RUN: python3 -c "
import json, sys
data = json.load(sys.stdin)
labels = [l for l in data.get('labels', []) if not l.startswith('status::')]
labels.append('status::' + sys.argv[1])
print(','.join(labels))
" {new_status}
  STORE: gitlab_labels
  PLATFORM: gitlab
- RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{issue_id}" --hostname $HOST -F "labels={gitlab_labels}"
  PLATFORM: gitlab
  EXPECT_EXIT: 0
# GitHub: targeted add/remove
- RUN: gh issue edit {issue_id} --add-label "status:{new_status}" -R "$HOST/$OWNER/$REPO"
  PLATFORM: github
  EXPECT_EXIT: 0
# State change: close, reopen, or skip
- CHECK: close eq "true"
  TRUE:
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{issue_id}" --hostname $HOST -F "state_event=close"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue close {issue_id} -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
- CHECK: close eq "false"
  TRUE:
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{issue_id}" --hostname $HOST -F "state_event=reopen"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue reopen {issue_id} -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
