# correct-course/complete.yaml
#
# Purpose: Updates issue descriptions for any artifacts modified during a course correction.
# Input variables: (none)
# Output variables: (none)
# Side effects: updates issue descriptions on the issue tracker; creates/removes /tmp/desc.md

- INCLUDE: common/check-config
# Detect which artifacts were modified
- RUN: git diff --name-only HEAD
  STORE: modified_files
# Story files: update issue description for each modified story
- RUN: python3 -c "
import sys, os, re
base = sys.argv[1]
for line in sys.stdin:
    path = line.rstrip()
    if path.startswith(base + '/') or path.startswith(base + os.sep):
        fname = os.path.basename(path)
        if re.match(r'^\d+-\d+-.+\.md$', fname):
            print(fname)
" {implementation_artifacts}
  STORE: modified_stories
- CHECK: empty modified_stories
  FALSE:
    - LOOP:
        items: modified_stories
        as: story_file
        do:
          - RUN: python3 -c "
import sys
print(sys.argv[1].replace('.md', ''))
" {story_file}
            STORE: story_key
          - RUN: python3 -c "
import sys
parts = sys.argv[1].replace('.md', '').split('-')
print(parts[0])
" {story_file}
            STORE: epic_num
          - RUN: python3 -c "
import sys
parts = sys.argv[1].replace('.md', '').split('-')
print(parts[1])
" {story_file}
            STORE: story_num
          - RUN: python3 -c "
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    print(f.read())
" {implementation_artifacts}/{story_file}
            STORE: story_body
          - WRITE:
              file: /tmp/desc.md
              content: "**Sprint Key:** `{story_key}`\n**Epic:** {epic_num}\n**PRD:** {prd_key}\n\n---\n\n{story_body}"
              mode: overwrite
          - SET: { variable: search_text, value: "{story_key}" }
          - INCLUDE: common/find-issue
          - CHECK: empty issue_id
            TRUE:
              - OUTPUT:
                  message: "Story issue not found for '{story_file}'. Skipping."
            FALSE:
              - SET: { variable: description_file, value: "/tmp/desc.md" }
              - INCLUDE: common/update-issue-description
# PRD: if modified, update issue description
- CHECK: modified_files contains "{planning_artifacts}/prd.md"
  TRUE:
    - RUN: python3 -c "
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    lines = f.readlines()
count = 0
start = 0
for i, line in enumerate(lines):
    if line.strip() == '---':
        count += 1
        if count == 2:
            start = i + 1
            break
print(''.join(lines[start:]).strip())
" {planning_artifacts}/prd.md
      STORE: prd_body
    - WRITE:
        file: /tmp/desc.md
        content: "**PRD:** {prd_key}\n\n---\n\n{prd_body}"
        mode: overwrite
    - SET: { variable: search_text, value: "PRD: {prd_key}" }
    - INCLUDE: common/find-issue
    - CHECK: empty issue_id
      TRUE:
        - OUTPUT:
            message: "PRD issue not found. Skipping PRD description update."
      FALSE:
        - SET: { variable: description_file, value: "/tmp/desc.md" }
        - INCLUDE: common/update-issue-description
# Epics: if modified, update each epic issue description
- CHECK: modified_files contains "{planning_artifacts}/epics.md"
  TRUE:
    - READ: {planning_artifacts}/epics.md
      STORE: epics_content
    - RUN: python3 -c "
import sys, re
content = sys.argv[1]
matches = list(re.finditer(r'^## Epic (\d+):', content, re.MULTILINE))
for i, m in enumerate(matches):
    start = m.start()
    end = matches[i+1].start() if i + 1 < len(matches) else len(content)
    epic_num = m.group(1)
    print(f'{epic_num},{start},{end}')
" {epics_content}
      STORE: epic_sections
    - LOOP:
        items: epic_sections
        as: section_info
        do:
          - RUN: python3 -c "
import sys
parts = sys.argv[1].rstrip().split(',')
print(parts[0])
" {section_info}
            STORE: epic_num
          - RUN: python3 -c "
import sys
parts = sys.argv[1].rstrip().split(',')
start, end = int(parts[1]), int(parts[2])
content = open('{planning_artifacts}/epics.md', 'r', encoding='utf-8').read()
print(content[start:end].strip())
" {section_info}
            STORE: epic_body
          - WRITE:
              file: /tmp/desc.md
              content: "**Epic:** {epic_num}\n\n---\n\n{epic_body}"
              mode: overwrite
          - SET: { variable: search_text, value: "Epic {epic_num}:" }
          - INCLUDE: common/find-issue
          - CHECK: empty issue_id
            TRUE:
              - OUTPUT:
                  message: "Epic {epic_num} issue not found. Skipping."
            FALSE:
              - SET: { variable: description_file, value: "/tmp/desc.md" }
              - INCLUDE: common/update-issue-description
