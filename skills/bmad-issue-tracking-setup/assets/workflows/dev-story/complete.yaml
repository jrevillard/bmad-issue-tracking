# dev-story/complete.yaml
#
# Purpose: Updates the story issue status after dev-story workflow completes.
#           Posts an implementation summary comment when transitioning to review.
# Input variables: (none)
# Output variables:
#   - story_key: the story key derived from the current branch name
# Side effects: updates issue labels/status on the issue tracker; creates/removes
#               /tmp/dev-story-comment.md; commits and pushes changes in the worktree

- INCLUDE: common/check-config
# Re-derive story_key from current branch name (context may have been compacted,
# and sprint-status.yaml may already reflect the updated status)
- RUN: git branch --show-current
  STORE: current_branch
- RUN: python3 -c "
import sys
branch = sys.argv[1]
parts = branch.rstrip().split('/')
if len(parts) >= 3:
    print(parts[-1])
else:
    print(branch)
" {current_branch}
  STORE: story_key
- CHECK: empty story_key
  TRUE:
    - OUTPUT:
        message: "Could not determine story_key from branch '{current_branch}'."
        stop: true
# Read sprint-status to determine the target status for this story
- READ: {implementation_artifacts}/sprint-status.yaml
  EXTRACT:
    entries: development_status
- FILTER:
    source: entries
    select: value
    where: key eq "{story_key}"
    store: story_status
# Find the issue whose description contains the story key
- RUN: glab api "projects/$PROJECT_ID/issues?search={story_key}" --hostname $HOST --paginate
  STORE: issue_result
  PLATFORM: gitlab
- RUN: gh api "repos/$OWNER/$REPO/issues?state=all&per_page=100" --paginate
  STORE: issue_result
  PLATFORM: github
- CHECK: empty issue_result
  TRUE:
    - OUTPUT:
        message: "Issue not found. Skipping."
        stop: true
- CHECK: platform eq "gitlab"
  TRUE:
    - FILTER:
        source: issue_result
        select: iid
        store: story_issue_id
  FALSE:
    - FILTER:
        source: issue_result
        select: number
        store: story_issue_id
# Determine workflow outcome and update issue status
- CHECK: story_status eq "review"
  TRUE:
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "labels[]=status{sep}review"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue edit {story_issue_id} --add-label "status:review" -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "state_event=reopen"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue reopen {story_issue_id} -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
    - WRITE:
        file: /tmp/dev-story-comment.md
        content: "## Ready for Review\n\n### Implemented\n- {key change 1}\n- {key change 2}\n\n### Notes\n- {point of attention for the reviewer}"
        mode: overwrite
    - RUN: glab api --method POST "projects/$PROJECT_ID/issues/{story_issue_id}/notes" --hostname $HOST -F "body=@/tmp/dev-story-comment.md"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue comment {story_issue_id} --body-file "/tmp/dev-story-comment.md" -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
    - RUN: rm -f /tmp/dev-story-comment.md
- CHECK: story_status eq "done"
  TRUE:
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "labels[]=status{sep}done"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue edit {story_issue_id} --add-label "status:done" --remove-label "status:review" -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "state_event=close"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue close {story_issue_id} -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
# Default: set label to in-progress, reopen if closed
- CHECK: story_status eq "in-progress"
  TRUE:
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "labels[]=status{sep}in-progress"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue edit {story_issue_id} --add-label "status:in-progress" -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
    - RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{story_issue_id}" --hostname $HOST -F "state_event=reopen"
      PLATFORM: gitlab
      EXPECT_EXIT: 0
    - RUN: gh issue reopen {story_issue_id} -R "$HOST/$OWNER/$REPO"
      PLATFORM: github
      EXPECT_EXIT: 0
# Commit and push
- RUN: git add .
- RUN: git commit -m "update story {story_key}"
- RUN: git push
- OUTPUT:
    message: "Story {story_key} updated. Staying in worktree."
