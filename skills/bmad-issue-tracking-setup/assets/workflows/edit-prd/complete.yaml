# edit-prd/complete.yaml
#
# Purpose: Updates the PRD issue description when the PRD is edited.
# Input variables: (none)
# Output variables: (none)
# Side effects: updates the PRD issue description on the issue tracker;
#               creates and removes /tmp/prd-desc.md

- INCLUDE: common/check-config
- INCLUDE: common/find-prd
# Find the PRD issue
- RUN: glab api "projects/{project}/issues?search=PRD:%20{prd_key}&labels=type{sep}prd" --hostname {host} --paginate
  STORE: prd_issues
  PLATFORM: gitlab
- RUN: gh api "repos/{project}/issues?state=all&per_page=100&labels=type:prd,prd:{prd_key}" --hostname {host} --paginate
  STORE: prd_issues
  PLATFORM: github
- CHECK: empty prd_issues
  TRUE:
    - OUTPUT:
        message: "PRD issue not found. Skipping."
        stop: true
- CHECK: platform eq "gitlab"
  TRUE:
    - FILTER:
        source: prd_issues
        select: iid
        store: prd_issue_id
  FALSE:
    - FILTER:
        source: prd_issues
        select: number
        where: title matches "PRD:"
        store: prd_issue_id
# Strip frontmatter and write description file
- RUN: python3 -c "
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    lines = f.readlines()
count = 0
start = 0
for i, line in enumerate(lines):
    if line.strip() == '---':
        count += 1
        if count == 2:
            start = i + 1
            break
print(''.join(lines[start:]).strip())
" {planning_artifacts}/prd.md
  STORE: prd_body
- WRITE:
    file: /tmp/prd-desc.md
    content: "**PRD:** {prd_key}\n\n---\n\n{prd_body}"
    mode: overwrite
# Update issue description via common sub-workflow
- SET: { variable: issue_id, value: "{prd_issue_id}" }
- SET: { variable: description_file, value: "/tmp/prd-desc.md" }
- INCLUDE: common/update-issue-description
