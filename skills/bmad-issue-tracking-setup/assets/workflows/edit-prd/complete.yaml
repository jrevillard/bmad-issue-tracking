# edit-prd/complete.yaml
#
# Purpose: Updates the PRD issue description when the PRD is edited.
# Input variables: (none)
# Output variables: (none)
# Side effects: updates the PRD issue description on the issue tracker;
#               creates and removes /tmp/prd-desc.md

- INCLUDE: common/check-config
- INCLUDE: common/find-prd
- CD: {prd_worktree_path}
# Find the PRD issue
- SET: { variable: search_text, value: "PRD: {prd_key}" }
- INCLUDE: common/find-issue
- CHECK: empty issue_id
  TRUE:
    - OUTPUT:
        message: "PRD issue not found. Skipping."
        stop: true
# Strip frontmatter and write description file
- RUN: python3 -c "
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    lines = f.readlines()
count = 0
start = 0
for i, line in enumerate(lines):
    if line.strip() == '---':
        count += 1
        if count == 2:
            start = i + 1
            break
print(''.join(lines[start:]).strip())
" {planning_artifacts}/prd.md
  STORE: prd_body
- WRITE:
    file: /tmp/prd-desc.md
    content: "**PRD:** {prd_key}\n\n---\n\n{prd_body}"
    mode: overwrite
# Update issue description via common sub-workflow
- SET: { variable: description_file, value: "/tmp/prd-desc.md" }
- INCLUDE: common/update-issue-description
