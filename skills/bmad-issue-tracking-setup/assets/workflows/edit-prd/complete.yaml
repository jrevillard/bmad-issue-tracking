# edit-prd/complete.yaml
#
# Purpose: Updates the PRD issue description when the PRD is edited.
# Input variables: (none)
# Output variables: (none)
# Side effects: updates the PRD issue description on the issue tracker;
#               creates and removes /tmp/prd-desc.md

- INCLUDE: common/check-config
- INCLUDE: common/find-prd
- RUN: glab api "projects/$PROJECT_ID/issues?search=PRD:%20{prd_key}&labels=type{sep}prd" --hostname $HOST --paginate
  STORE: prd_issues
  PLATFORM: gitlab
- RUN: gh api "repos/$OWNER/$REPO/issues?state=all&per_page=100&labels=type:prd" --paginate
  STORE: prd_issues
  PLATFORM: github
- CHECK: empty prd_issues
  TRUE:
    - OUTPUT:
        message: "PRD issue not found. Skipping."
        stop: true
- CHECK: platform eq "gitlab"
  TRUE:
    - FILTER:
        source: prd_issues
        select: iid
        store: prd_issue_id
  FALSE:
    - FILTER:
        source: prd_issues
        select: number
        store: prd_issue_id
- RUN: python3 -c "
import sys
with open(sys.argv[1], 'r', encoding='utf-8') as f:
    lines = f.readlines()
count = 0
start = 0
for i, line in enumerate(lines):
    if line.strip() == '---':
        count += 1
        if count == 2:
            start = i + 1
            break
print(''.join(lines[start:]).strip())
" {planning_artifacts}/prd.md
  STORE: prd_body
- WRITE:
    file: /tmp/prd-desc.md
    content: "**PRD:** {prd_key}\n\n---\n\n{prd_body}"
    mode: overwrite
- RUN: glab api --method PUT "projects/$PROJECT_ID/issues/{prd_issue_id}" --hostname $HOST -F "description=@/tmp/prd-desc.md"
  PLATFORM: gitlab
  EXPECT_EXIT: 0
- RUN: gh issue edit {prd_issue_id} --body-file "/tmp/prd-desc.md" -R "$HOST/$OWNER/$REPO"
  PLATFORM: github
  EXPECT_EXIT: 0
- RUN: rm -f /tmp/prd-desc.md
