# sprint-status/activation.yaml
#
# Purpose: Switches to the PRD worktree for sprint status sync.
# Input variables: (none)
# Output variables: (none)
# Side effects: switches agent to PRD worktree

- INCLUDE: common/check-config
- INCLUDE: common/find-prd
- CD: {prd_worktree_path}
- OUTPUT:
    message: "Switched to PRD worktree for sprint status sync."
